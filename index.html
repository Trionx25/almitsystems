<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALMIT</title>
    
<meta name="description" content="AirLand Marine Innovations & Technologies Private Limited">
<meta property="og:title" content="ALMIT">
<meta property="og:description" content="AirLand Marine Innovations & Technologies Private Limited">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.almitsystems.com/">
<meta property="og:image" content="https://www.almitsystems.com/logo.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="1200">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ALMIT">
<meta name="twitter:description" content="AirLand Marine Innovations & Technologies Private Limited">
<meta name="twitter:image" content="https://www.almitsystems.com/logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{

    background:#fff;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:"Manrope",sans-serif;

}

/* Logo */

img{

    width:min(80vw,750px);
    max-width:120%;
    height:auto;

    user-select:none;
    -webkit-user-drag:none;

}

   /* Maintenance Text */

.maintenance{

    position:fixed;

    top:20px;

    left:20px;

    font-family:"Courier New", Courier, monospace;

    font-size:20px;

    font-weight:bold;

    color:#ff0000;

    text-transform:uppercase;

    letter-spacing:1px;

    z-index:2000;

    user-select:none;

    animation:breathing 2.2s ease-in-out infinite;

}

/* Breathing Animation */

@keyframes breathing{

    0%{

        opacity:.45;

        color:#8b0000;

        text-shadow:0 0 4px rgba(255,0,0,.25);

    }

    50%{

        opacity:1;

        color:#ff0000;

        text-shadow:
            0 0 8px rgba(255,0,0,.7),
            0 0 16px rgba(255,0,0,.5),
            0 0 24px rgba(255,0,0,.35);

    }

    100%{

        opacity:.45;

        color:#8b0000;

        text-shadow:0 0 4px rgba(255,0,0,.25);

    }

}
    
    .drone{

    position:fixed;

    top:60%;

    right:-250px;

    width:150px;

    height:auto;

    user-select:none;

    -webkit-user-drag:none;

    pointer-events:none;

    z-index:100;

    animation:droneFlight 7s ease-in-out infinite;

}

/* Bottom Buttons */

.left-buttons{

    position:fixed;

    left:20px;

    bottom:25px;

    display:flex;

    gap:14px;

    z-index:1000;

}

.right-buttons{

    position:fixed;

    right:20px;

    bottom:25px;

    display:flex;

    gap:14px;

    z-index:1000;

}

/* Button */

.fab{

    width:48px;
    height:48px;

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    text-decoration:none;

    color:#fff;

    background:rgba(30,30,32,.82);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 8px 24px rgba(0,0,0,.35);

    transition:
        width .30s ease,
        border-radius .30s ease,
        padding .30s ease,
        transform .25s ease,
        background .25s ease;

    animation:
        slideUp .7s ease,
        bounce 4s infinite;

    white-space:nowrap;

}

/* Expand */

.fab:hover,
.fab:focus,
.fab:focus-visible{

    width:145px;

    border-radius:18px;

    justify-content:flex-start;

    padding:0 16px;

}

/* Icon */

.fab i{

    min-width:16px;

    font-size:14px;

}

/* Text */

.fab span{

    max-width:0;

    opacity:0;

    overflow:hidden;

    margin-left:0;

    font-size:10px;

    font-weight:200;

    transition:.25s;

}

.fab:hover span,
.fab:focus span,
.fab:focus-visible span{

    max-width:110px;

    opacity:1;

    margin-left:10px;

}

/* Colors */

.location i{
    color:#ff5252;
}

.whatsapp i{
    color:#25D366;
}

.call i{
    color:#3fa9f5;
}

.mail i{
    color:#ffb74d;
}

/* Hover */

.fab:hover,
.fab:focus{

    background:rgba(48,48,50,.95);

    transform:translateY(-3px);

}

/* Animations */

@keyframes slideUp{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

@keyframes bounce{

    0%,90%,100%{

        transform:translateY(0);

    }

    94%{

        transform:translateY(-5px);

    }

    97%{

        transform:translateY(0);

    }

}

   @keyframes droneFlight{

    /* Start outside the right side */

    0%{

        top:60%;
        right:-180px;

        opacity:0;

        transform:rotate(-10deg) scale(.9);

    }

    /* Enter while climbing */

    18%{

        top:40%;
        right:30px;

        opacity:1;

        transform:rotate(-6deg);

    }

    /* Reach top-right */

    35%{

        top:10%;
        right:30px;

        opacity:1;

        transform:rotate(-2deg);

    }

    /* Move only slightly left */

    58%{

        top:10%;
        right:22vw;

        opacity:1;

        transform:rotate(0deg);

    }

    /* Return to top-right */

    82%{

        top:10%;
        right:30px;

        opacity:1;

        transform:rotate(6deg);

    }

    /* Fly away */

    100%{

        top:-180px;
        right:-180px;

        opacity:0;

        transform:rotate(15deg) scale(.7);

    }

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(-20px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

    @media(max-width:768px){

    .drone{

        width:150px;

        top:20px;

        right:15px;

    }

}

/* Mobile */

@media(max-width:768px){

    img{

        width:92vw;

    }

   .left-buttons{

    left:10px;

    bottom:15px;

    gap:6px;

}

.right-buttons{

    right:10px;

    bottom:15px;

    gap:6px;

}

    .fab{

        width:44px;
        height:44px;

    }

    .fab:hover,
    .fab:focus,
    .fab.active{

        width:130px;

    }

}

</style>

</head>

<body>

<div class="maintenance">
    Site Under Maintenance
</div>

<img src="logo.png" alt="ALMIT Logo">

<img src="drone.png"
     alt="ALMIT Drone"
     class="drone">

<div class="left-buttons">

    <!-- Location -->

    <a class="fab location"
       href="https://maps.app.goo.gl/fydyNU1JfukbqF8w6"
       target="_blank">

        <i class="fa-solid fa-location-dot"></i>
        <span>Location</span>

    </a>

    <!-- Email -->

    <a class="fab mail"
       href="mailto:info@almitsystems.com">

        <i class="fa-solid fa-envelope"></i>
        <span>Email</span>

    </a>

</div>

<div class="right-buttons">

    <!-- WhatsApp -->

    <a class="fab whatsapp"
       href="https://wa.me/919995869449"
       target="_blank">

        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>

    </a>

    <!-- Call -->

    <a class="fab call"
       href="tel:+919995869449">

        <i class="fa-solid fa-phone"></i>
        <span>Call</span>

    </a>

</div>

<script>
// Mobile: tap once to expand, tap again to open
document.querySelectorAll(".fab").forEach(btn => {

    btn.addEventListener("click", function(e){

        if(window.innerWidth > 768) return;

        if(!this.classList.contains("active")){

            e.preventDefault();

            document.querySelectorAll(".fab").forEach(b=>{
                b.classList.remove("active");
            });

            this.classList.add("active");

        }

    });

});

document.addEventListener("click",function(e){

    if(!e.target.closest(".fab")){

        document.querySelectorAll(".fab").forEach(b=>{
            b.classList.remove("active");
        });

    }

});
</script>

</body>
</html>
