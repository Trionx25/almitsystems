<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALMIT</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

/* Logo */

img{
    width:min(80vw,750px);
    max-width:110%;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
}

/* Bottom Buttons */

.floating-buttons{

    position:fixed;

    left:50%;
    bottom:25px;

    transform:translateX(-50%);

    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;

    gap:12px;

    z-index:1000;

}

/* Apple / DJI Style Button */

.fab{

    width:100px;
    height:30px;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:10px;

    text-decoration:none;
    color:#fff;

    border-radius:14px;

    background:rgba(28,28,30,.82);

    backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 8px 24px rgba(0,0,0,.35);

    transition:all .25s ease;

    animation:
        slideUp .8s ease forwards,
        bounce 7s infinite;

}

.fab:hover{

    transform:translateY(-4px);

    background:rgba(45,45,48,.95);

    box-shadow:0 12px 30px rgba(0,0,0,.45);

}

.fab i{

    font-size:10px;

}

.fab span{

    font-size:10px;
    font-weight:500;
    white-space:nowrap;

}

/* Icon Colors */

.location i{
    color:#ff5252;
}

.whatsapp i{
    color:#25D366;
}

.call i{
    color:#3fa9f5;
}

.mail i{
    color:#ffb74d;
}

/* Animation */

@keyframes slideUp{

    from{

        opacity:0;
        transform:translateY(40px);

    }

    to{

        opacity:1;
        transform:translateY(0);

    }

}

@keyframes bounce{

    0%,90%,100%{

        transform:translateY(0);

    }

    94%{

        transform:translateY(-6px);

    }

    97%{

        transform:translateY(0);

    }

}

/* Mobile */

@media(max-width:768px){

    img{

        width:92vw;

    }

    .floating-buttons{

        width:100%;

        left:0;
        transform:none;

        justify-content:center;

        gap:8px;

        bottom:15px;

        flex-wrap:wrap;

    }

    .fab{

        width:120px;
        height:46px;

        border-radius:15px;

    }

    .fab i{

        font-size:18px;

    }

    .fab span{

        font-size:12px;

    }

}

</style>

</head>

<body>

<img src="logo.png" alt="ALMIT Logo">

<div class="floating-buttons">

    <a class="fab location"
       href="https://maps.app.goo.gl/fydyNU1JfukbqF8w6"
       target="_blank">

        <i class="fa-solid fa-location-dot"></i>
        <span>Location</span>

    </a>

    <a class="fab whatsapp"
       href="https://wa.me/919995869449"
       target="_blank">

        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>

    </a>

    <a class="fab call"
       href="tel:+919995869449">

        <i class="fa-solid fa-phone"></i>
        <span>Call</span>

    </a>

    <a class="fab mail"
       href="mailto:info@almitsystems.com">

        <i class="fa-solid fa-envelope"></i>
        <span>Email</span>

    </a>

</div>

</body>
</html>
