<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ALMIT</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{

    margin:0;
    padding:0;
    box-sizing:border-box;

}

html,
body{

    width:100%;
    height:100%;

}

body{

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:hidden;

    font-family:"Manrope",sans-serif;

}

/* ---------------- Logo ---------------- */

img{

    width:min(80vw,750px);

    max-width:90%;

    height:auto;

    user-select:none;

    -webkit-user-drag:none;

}

/* ---------------- Bottom Buttons ---------------- */

.floating-buttons{

    position:fixed;

    left:50%;

    bottom:24px;

    transform:translateX(-50%);

    display:flex;

    gap:10px;

    z-index:1000;

}

/* ---------------- Button ---------------- */

.fab{

    width:48px;

    height:48px;

    display:flex;

    align-items:center;

    justify-content:center;

    overflow:hidden;

    white-space:nowrap;

    border-radius:24px;

    text-decoration:none;

    color:#fff;

    background:rgba(30,30,32,.82);

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 8px 24px rgba(0,0,0,.35);

    transition:

        width .35s cubic-bezier(.22,1,.36,1),

        padding .35s cubic-bezier(.22,1,.36,1),

        border-radius .35s,

        transform .25s,

        background .25s;

}

/* Hover */

.fab:hover,
.fab:focus,
.fab.active{

    width:165px;

    justify-content:flex-start;

    padding:0 16px;

    border-radius:18px;

    background:rgba(48,48,50,.95);

    transform:translateY(-2px);

}

/* Icon */

.fab i{

    width:18px;

    min-width:18px;

    text-align:center;

    font-size:18px;

    flex-shrink:0;

}

/* Text */

.fab span{

    opacity:0;

    transform:translateX(-10px);

    margin-left:0;

    white-space:nowrap;

    pointer-events:none;

    font-size:12px;

    font-weight:600;

    letter-spacing:.2px;

    transition:

        opacity .22s ease,

        transform .22s ease,

        margin-left .22s ease;

}

.fab:hover span,
.fab:focus span,
.fab.active span{

    opacity:1;

    transform:translateX(0);

    margin-left:10px;

}

/* Icon Colours */

.location i{

    color:#ff5252;

}

.whatsapp i{

    color:#25D366;

}

.call i{

    color:#3fa9f5;

}

.mail i{

    color:#ffb74d;

}

/* Mobile */

@media(max-width:768px){

img{

    width:92vw;

}

.floating-buttons{

    gap:8px;

    bottom:16px;

}

.fab{

    width:44px;

    height:44px;

}

.fab:hover{

    width:44px;

    padding:0;

    justify-content:center;

    border-radius:22px;

    transform:none;

}

.fab.active{

    width:150px;

    justify-content:flex-start;

    padding:0 14px;

    border-radius:18px;

}

}

/* Animation */

@keyframes slideUp{

from{

opacity:0;

transform:translateY(30px);

}

to{

opacity:1;

transform:translateY(0);

}

}

</style>

</head>

<body>

<img src="logo.png" alt="ALMIT Logo">

<div class="floating-buttons">

    <!-- Location -->

    <a class="fab location"
       href="https://maps.app.goo.gl/fydyNU1JfukbqF8w6"
       target="_blank"
       aria-label="Location">

        <i class="fa-solid fa-location-dot"></i>

        <span>Location</span>

    </a>

    <!-- WhatsApp -->

    <a class="fab whatsapp"
       href="https://wa.me/919995869449"
       target="_blank"
       aria-label="WhatsApp">

        <i class="fa-brands fa-whatsapp"></i>

        <span>WhatsApp</span>

    </a>

    <!-- Call -->

    <a class="fab call"
       href="tel:+919995869449"
       aria-label="Call">

        <i class="fa-solid fa-phone"></i>

        <span>Call</span>

    </a>

    <!-- Email -->

    <a class="fab mail"
       href="mailto:info@almitsystems.com"
       aria-label="Email">

        <i class="fa-solid fa-envelope"></i>

        <span>Email</span>

    </a>

</div>

<script>

/* ---------- Mobile:
   First tap = Expand
   Second tap = Open
--------------------------------*/

const buttons = document.querySelectorAll(".fab");

buttons.forEach(button=>{

    button.addEventListener("click",function(e){

        if(window.innerWidth>768){

            return;

        }

        if(!this.classList.contains("active")){

            e.preventDefault();

            buttons.forEach(btn=>{

                btn.classList.remove("active");

            });

            this.classList.add("active");

        }

    });

});

/* Collapse when tapping outside */

document.addEventListener("click",function(e){

    if(!e.target.closest(".fab")){

        buttons.forEach(btn=>{

            btn.classList.remove("active");

        });

    }

});

/* ---------- Keyboard accessibility ---------- */

buttons.forEach(button=>{

    button.addEventListener("blur",function(){

        if(window.innerWidth<=768){

            this.classList.remove("active");

        }

    });

});

/* ---------- Close expanded button when screen resizes ---------- */

window.addEventListener("resize",function(){

    if(window.innerWidth>768){

        buttons.forEach(btn=>{

            btn.classList.remove("active");

        });

    }

});

</script>

</body>

</html>
