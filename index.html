<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALMIT</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    font-family:"Manrope",sans-serif;

}

/* Logo */

img{

    width:min(80vw,750px);
    max-width:120%;
    height:auto;

    user-select:none;
    -webkit-user-drag:none;

}

/* Bottom Buttons */

.floating-buttons{

    position:fixed;

    left:50%;
    bottom:25px;

    transform:translateX(-50%);

    display:flex;
    gap:12px;

    z-index:1000;

}

/* Button */

.fab{

    width:48px;
    height:48px;

    border-radius:24px;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;

    text-decoration:none;

    color:#fff;

    background:rgba(30,30,32,.82);

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,.08);

    box-shadow:0 8px 24px rgba(0,0,0,.35);

    transition:
        width .30s ease,
        border-radius .30s ease,
        padding .30s ease,
        transform .25s ease,
        background .25s ease;

    animation:
        slideUp .8s ease,
        bounce 7s infinite;

    white-space:nowrap;

}

/* Expand */

.fab:hover,
.fab:focus,
.fab:focus-visible{

    width:145px;

    border-radius:18px;

    justify-content:flex-start;

    padding:0 16px;

}

/* Icon */

.fab i{

    min-width:16px;

    font-size:18px;

}

/* Text */

.fab span{

    max-width:0;

    opacity:0;

    overflow:hidden;

    margin-left:0;

    font-size:10px;

    font-weight:200;

    transition:.25s;

}

.fab:hover span,
.fab:focus span,
.fab:focus-visible span{

    max-width:90px;

    opacity:1;

    margin-left:10px;

}

/* Colors */

.location i{
    color:#ff5252;
}

.whatsapp i{
    color:#25D366;
}

.call i{
    color:#3fa9f5;
}

.mail i{
    color:#ffb74d;
}

/* Hover */

.fab:hover,
.fab:focus{

    background:rgba(48,48,50,.95);

    transform:translateY(-3px);

}

/* Animations */

@keyframes slideUp{

    from{

        opacity:0;

        transform:translateY(30px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

@keyframes bounce{

    0%,90%,100%{

        transform:translateY(0);

    }

    94%{

        transform:translateY(-5px);

    }

    97%{

        transform:translateY(0);

    }

}

/* Mobile */

@media(max-width:768px){

    img{

        width:92vw;

    }

    .floating-buttons{

        bottom:18px;

        gap:8px;

    }

    .fab{

        width:44px;
        height:44px;

    }

    .fab:hover,
    .fab:focus,
    .fab.active{

        width:130px;

    }

}

</style>

</head>

<body>

<img src="logo.png" alt="ALMIT Logo">

<div class="floating-buttons">

    <a class="fab location"
       href="https://maps.app.goo.gl/fydyNU1JfukbqF8w6"
       target="_blank">

        <i class="fa-solid fa-location-dot"></i>
        <span>Location</span>

    </a>

    <a class="fab whatsapp"
       href="https://wa.me/919995869449"
       target="_blank">

        <i class="fa-brands fa-whatsapp"></i>
        <span>WhatsApp</span>

    </a>

    <a class="fab call"
       href="tel:+919995869449">

        <i class="fa-solid fa-phone"></i>
        <span>Call</span>

    </a>

    <a class="fab mail"
       href="mailto:info@almitsystems.com">

        <i class="fa-solid fa-envelope"></i>
        <span>Email</span>

    </a>

</div>

<script>
// Mobile: tap once to expand, tap again to open
document.querySelectorAll(".fab").forEach(btn => {

    btn.addEventListener("click", function(e){

        if(window.innerWidth > 768) return;

        if(!this.classList.contains("active")){

            e.preventDefault();

            document.querySelectorAll(".fab").forEach(b=>{
                b.classList.remove("active");
            });

            this.classList.add("active");

        }

    });

});

document.addEventListener("click",function(e){

    if(!e.target.closest(".fab")){

        document.querySelectorAll(".fab").forEach(b=>{
            b.classList.remove("active");
        });

    }

});
</script>

</body>
</html>
